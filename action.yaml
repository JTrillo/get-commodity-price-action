name: 'Get Commodity Price'
description: 'Get gold or silver current price per ounce in USD/EUR'
inputs:
  commodity:
    description: 'Commodity (gold or silver)'
    required: true
    default: 'gold'
  currency:
    description: 'Currency (USD o EUR)'
    required: false
    default: 'USD'
outputs:
  price:
    description: 'Current price of the selected commodity per ounce'
runs:
  using: 'node20'
  main: 'index.js'